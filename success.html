<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

margin:0;

display:flex;

.card{

background:white;

width:420px;

padding:40px;

border-radius:20px;

text-align:center;

box-shadow:0 20px 40px rgba(0,0,0,.3);

}

h1{

color:#22c55e;

margin-bottom:20px;

}

p{

margin:15px 0;

font-size:18px;

color:#444;

}

.codigo{

margin:25px 0;

padding:18px;

background:#f2f2f2;

border-radius:10px;

font-size:30px;

font-weight:bold;

letter-spacing:3px;

color:#635BFF;

}

button{

width:100%;

padding:16px;

margin-top:15px;

border:none;

border-radius:10px;

cursor:pointer;

font-size:18px;

background:#635BFF;

color:white;

button:hover{

a{

552455

<button>

🚀 Ir al Portal Premium

</button>

</a>

</div>
